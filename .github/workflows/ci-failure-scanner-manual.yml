name: CI Failure Scanner (Manual Dispatch)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Specific PR to check (optional)'
        required: false
        type: number

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  manual-scan:
    name: Manual scan for PR CI failures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gh and jq
        run: |
          sudo apt-get update -y && sudo apt-get install -y jq

      - name: Run scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_LIST='[${{ github.event.inputs.pr_number }}]'
          else
            PR_LIST=$(gh pr list --state open --limit 200 --json number,statusCheckRollup --jq '[.[] | select(.statusCheckRollup | any(.conclusion == "FAILURE")) | .number] | @json')
          fi

          echo "Found PRs: $PR_LIST"

          for PR in $(echo "$PR_LIST" | jq -r '.[]'); do
            echo "Processing PR #$PR"
            PR_INFO=$(gh pr view "$PR" --json number,title,author,headRefName,statusCheckRollup,createdAt --jq '.')
            TITLE=$(echo "$PR_INFO" | jq -r '.title')
            AUTHOR=$(echo "$PR_INFO" | jq -r '.author.login')
            BRANCH=$(echo "$PR_INFO" | jq -r '.headRefName')
            FAILED_CHECKS=$(echo "$PR_INFO" | jq -r '.statusCheckRollup | map(select(.conclusion == "FAILURE") | .name) | join("\n• ")')
            FAILED_COUNT=$(echo "$FAILED_CHECKS" | grep -c . || true)

            EXISTING=$(gh issue list --state all --limit 500 --json number,body --jq ".[] | select(.body | contains(\"PR #$PR\") or contains(\"https://github.com/${GITHUB_REPOSITORY}/pull/$PR\")) | .number" | head -1)

            if [ -n "$EXISTING" ]; then
              echo "Issue exists: #$EXISTING - adding a comment"
              gh issue comment "$EXISTING" --body "📍 **Still Failing** - Redetected on $(date -u +'%Y-%m-%d %H:%M:%S UTC'). CI still showing failures."
            else
              ISSUE_TITLE="🚨 CI Failure on PR #$PR: $TITLE"
              ISSUE_BODY="## CI Failure Alert\n\n**PR**: [#$PR](https://github.com/${GITHUB_REPOSITORY}/pull/$PR)\n**PR Title**: $TITLE\n**Author**: @$AUTHOR\n**Branch**: \\`$BRANCH\\`\n**Failed Checks**: $FAILED_COUNT\n\n### Failed CI Checks\n\n\`\`\`\n$FAILED_CHECKS\n\`\`\`\n\n### Next Steps\n1. Review the PR checks\n2. Fix issues and push changes\n\n*Auto-created by manual scanner.*"

              ISSUE_NUM=$(gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "ci-failure,automated,bug" --assignee "$AUTHOR" --json number --jq '.number')
              echo "Created issue #$ISSUE_NUM"
              gh pr comment "$PR" --body "🚨 **CI Failure Detected** - Issue [#$ISSUE_NUM](https://github.com/${GITHUB_REPOSITORY}/issues/$ISSUE_NUM) created for tracking."
            fi
          done
