name: Auto-Create Issue on CI Failure

# This workflow runs after any CI job fails and creates a GitHub issue
# Mandatory for all Landing Zone and Spoke repositories

on:
  workflow_run:
    workflows: ['Validate All', 'Security Scan', 'Test', 'Deploy']
    types: [completed]

permissions:
  issues: write
  contents: read

jobs:
  create-failure-issue:
    if: failure() || github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Get workflow run details
        id: workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the failed workflow run
          RUN_ID="${{ github.event.workflow_run.id }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COMMIT_SHA="${{ github.event.workflow_run.head_commit.id }}"
          ACTOR="${{ github.event.workflow_run.triggering_actor.login }}"
          
          # Get last commit message
          COMMIT_MSG=$(git log -1 --pretty=%B "$COMMIT_SHA" 2>/dev/null | head -1 || echo "Unknown commit")
          
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "workflow_name=$WORKFLOW_NAME" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${COMMIT_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue for CI failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ steps.workflow.outputs.run_id }}`;
            const logsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ steps.workflow.outputs.run_id }}/attempts/1`;
            
            const title = `🚨 CI Failure: ${{ steps.workflow.outputs.workflow_name }} on ${{ steps.workflow.outputs.branch }}`;
            
            const body = `## CI Workflow Failed

**Workflow**: \`${{ steps.workflow.outputs.workflow_name }}\`
**Branch**: \`${{ steps.workflow.outputs.branch }}\`
**Commit**: [\`${{ steps.workflow.outputs.commit_sha }}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${{ github.event.workflow_run.head_commit.id }})
**Commit Message**: ${{ steps.workflow.outputs.commit_msg }}
**Triggered by**: @${{ steps.workflow.outputs.actor }}

### Links
- [View Workflow Run](${runUrl})
- [View Detailed Logs](${logsUrl})

### Investigation
1. Review the workflow logs for error messages
2. Check the commit changes for issues
3. Run validation locally:
   \`\`\`bash
   git checkout ${{ steps.workflow.outputs.branch }}
   ./run.sh validate
   ./run.sh security
   \`\`\`

### Action Items
- [ ] Identify root cause of failure
- [ ] Fix the issue in code
- [ ] Push corrected commit
- [ ] Verify CI passes
- [ ] Close this issue when resolved

---
_Auto-generated by CI Failure Bot | [Policy](https://github.com/${{ context.repo.owner }}/${{ context.repo.repo }}/blob/main/docs/governance/policies/CI_FAILURE_POLICY.md)_`;

            // Check if issue already exists for this run
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ci-failure', 'automated'],
              per_page: 30
            });

            // Avoid duplicates - check if issue for this exact run exists
            const isDuplicate = existingIssues.data.some(issue => 
              issue.body.includes(`runs/${{ steps.workflow.outputs.run_id }}`)
            );

            if (!isDuplicate) {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure', 'automated', 'bug', 'priority-p1'],
                assignee: context.actor  // Assign to the person who triggered the failure
              });

              console.log(`✅ Created issue #${issue.data.number}: ${title}`);
            } else {
              console.log(`⚠️ Duplicate issue detected - skipping creation`);
            }

      - name: Add comment to PR if applicable
        if: github.event.workflow_run.pull_requests.length > 0
        uses: actions/github-script@v7
        with:
          script: |
            const prs = ${{ toJson(github.event.workflow_run.pull_requests) }};
            if (prs && prs.length > 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ steps.workflow.outputs.run_id }}`;
              const comment = `🚨 **CI Workflow Failed**: [\`${{ steps.workflow.outputs.workflow_name }}\`](${runUrl})\n\nAn issue has been automatically created to track this failure. Please review the logs and fix the issues before this PR can be merged.`;
              
              for (const pr of prs) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: comment
                });
              }
            }
